<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeetCode Roadmap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0f;--bg2:#131316;--bg3:#1a1a1f;--bg4:#22222a;
  --border:#2a2a35;--border2:#3a3a48;
  --text:#e8e8f0;--text2:#9090a8;--text3:#5a5a70;
  --easy:#22c55e;--easy-bg:#052012;--easy-border:#0a4024;
  --med:#f59e0b;--med-bg:#1a1000;--med-border:#3d2600;
  --hard:#ef4444;--hard-bg:#1a0505;--hard-border:#3d0a0a;
  --accent:#7c6af7;--accent2:#a89cf8;--accent-bg:#1a1840;
  --glow:rgba(124,106,247,0.15);
}
body{background:var(--bg);color:var(--text);min-height:100vh;font-family:'Syne',sans-serif}
#app{min-height:100vh;display:flex;flex-direction:column}
.hero{padding:3rem 2rem 2rem;text-align:center;background:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(124,106,247,0.12),transparent 70%);border-bottom:1px solid var(--border)}
.hero h1{font-size:2.4rem;font-weight:800;letter-spacing:-0.03em;margin-bottom:.5rem}
.hero h1 span{color:var(--accent2)}
.hero>p{color:var(--text2);font-size:.85rem;margin-bottom:1.5rem;font-family:'JetBrains Mono',monospace}
.search-wrap{max-width:560px;margin:0 auto;position:relative}
.search-input{width:100%;padding:.85rem 1rem .85rem 3rem;background:var(--bg3);border:1.5px solid var(--border2);border-radius:12px;color:var(--text);font-size:1rem;font-family:'Syne',sans-serif;outline:none;transition:border-color .2s,box-shadow .2s}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
.search-input::placeholder{color:var(--text3)}
.search-icon{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--text3);font-size:1.1rem;pointer-events:none}
.autocomplete{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;overflow:hidden;z-index:100;box-shadow:0 12px 40px rgba(0,0,0,.6);max-height:300px;overflow-y:auto;display:none}
.autocomplete.show{display:block}
.ac-item{padding:.65rem 1rem;cursor:pointer;display:flex;align-items:center;gap:.75rem;border-bottom:1px solid var(--border);font-size:.9rem}
.ac-item:last-child{border-bottom:none}
.ac-item:hover,.ac-item.ac-active{background:var(--bg4)}
.ac-id{color:var(--text3);font-family:'JetBrains Mono',monospace;font-size:.78rem;min-width:36px}
.ac-title{flex:1}
.suggested{display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap;margin-top:1rem}
.sug-btn{padding:.3rem .75rem;background:var(--bg3);border:1px solid var(--border2);border-radius:20px;color:var(--text2);font-size:.78rem;cursor:pointer;transition:all .15s;font-family:'JetBrains Mono',monospace}
.sug-btn:hover{border-color:var(--accent);color:var(--accent2);background:var(--accent-bg)}
.badge{display:inline-flex;align-items:center;padding:.2rem .6rem;border-radius:6px;font-size:.72rem;font-weight:600;font-family:'JetBrains Mono',monospace;letter-spacing:.04em;text-transform:uppercase}
.badge.easy{background:var(--easy-bg);color:var(--easy);border:1px solid var(--easy-border)}
.badge.medium{background:var(--med-bg);color:var(--med);border:1px solid var(--med-border)}
.badge.hard{background:var(--hard-bg);color:var(--hard);border:1px solid var(--hard-border)}
.stats-bar{display:flex;gap:1.5rem;padding:.75rem 1.5rem;background:var(--bg2);border-bottom:1px solid var(--border);font-size:.78rem;color:var(--text2);font-family:'JetBrains Mono',monospace;flex-wrap:wrap}
.stat{display:flex;align-items:center;gap:.4rem}
.stat-dot{width:8px;height:8px;border-radius:50%}
.roadmap-area{flex:1;padding:1.5rem;display:flex;gap:1.5rem}
.roadmap-canvas{flex:1;min-height:500px}
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:400px;gap:1rem;color:var(--text2)}
.spinner{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:400px;gap:1rem;color:var(--text3);text-align:center}
.panel{width:340px;flex-shrink:0;background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;max-height:calc(100vh - 200px);position:sticky;top:1.5rem}
.panel-header{padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.panel-header h3{font-size:.95rem;font-weight:600}
.panel-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:1.2rem;padding:0;line-height:1}
.panel-close:hover{color:var(--text)}
.panel-body{padding:1.25rem;overflow-y:auto;flex:1}
.panel-title{font-size:1.15rem;font-weight:700;margin:.5rem 0;line-height:1.3}
.panel-meta{display:flex;flex-wrap:wrap;gap:.5rem;margin:.75rem 0}
.meta-chip{padding:.2rem .6rem;background:var(--bg3);border:1px solid var(--border);border-radius:6px;font-size:.75rem;color:var(--text2);font-family:'JetBrains Mono',monospace}
.panel-desc{font-size:.85rem;color:var(--text2);line-height:1.6;margin:.75rem 0}
.panel-topics-title{font-size:.75rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:.5rem;font-family:'JetBrains Mono',monospace}
.topic-tags{display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:.75rem}
.topic-tag{padding:.2rem .55rem;background:var(--accent-bg);border:1px solid rgba(124,106,247,.25);border-radius:6px;font-size:.73rem;color:var(--accent2)}
.panel-link{display:flex;align-items:center;gap:.5rem;padding:.65rem 1rem;background:var(--accent);border-radius:8px;color:#fff;text-decoration:none;font-size:.85rem;font-weight:600;margin-top:1rem;justify-content:center}
.panel-link:hover{opacity:.85}
.roadmap-title{font-size:1.1rem;font-weight:700}
.roadmap-sub{font-size:.82rem;color:var(--text2);font-family:'JetBrains Mono',monospace}
.filters{display:flex;gap:.5rem;flex-wrap:wrap}
.filter-btn{padding:.28rem .75rem;background:var(--bg3);border:1px solid var(--border);border-radius:20px;font-size:.75rem;color:var(--text2);cursor:pointer;transition:all .15s;font-family:'JetBrains Mono',monospace}
.filter-btn.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent2)}
.level-section{margin-bottom:1.5rem}
.level-label{font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-bottom:.75rem;display:flex;align-items:center;gap:.5rem}
.level-label::before{content:'';flex:1;height:1px;background:var(--border)}
.node-grid{display:flex;flex-direction:column;gap:.6rem}
.problem-node{padding:.8rem 1rem;background:var(--bg2);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:.75rem;position:relative}
.problem-node:hover{border-color:var(--border2);background:var(--bg3);transform:translateX(2px)}
.problem-node.selected{border-color:var(--accent);background:var(--accent-bg);box-shadow:0 0 0 1px var(--accent)}
.problem-node.target-node{border-color:var(--accent);background:var(--bg3)}
.problem-node.target-node::before{content:'TARGET';position:absolute;top:-10px;right:10px;background:var(--accent);color:#fff;font-size:.6rem;padding:2px 7px;border-radius:4px;font-family:'JetBrains Mono',monospace;letter-spacing:.08em;font-weight:600}
.node-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.node-dot.easy{background:var(--easy);box-shadow:0 0 6px var(--easy)}
.node-dot.medium{background:var(--med);box-shadow:0 0 6px var(--med)}
.node-dot.hard{background:var(--hard);box-shadow:0 0 6px var(--hard)}
.node-info{flex:1;min-width:0}
.node-title{font-size:.87rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.node-topics{font-size:.72rem;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:'JetBrains Mono',monospace;margin-top:.2rem}
.node-right{display:flex;flex-direction:column;align-items:flex-end;gap:.3rem;flex-shrink:0}
.node-id{font-size:.68rem;color:var(--text3);font-family:'JetBrains Mono',monospace}
.node-ar{font-size:.7rem;color:var(--text2);font-family:'JetBrains Mono',monospace}
.conn-line{width:2px;height:20px;background:linear-gradient(to bottom,var(--accent),transparent);margin:0 auto;opacity:.4}
.pos-box{margin:.75rem 0;padding:.65rem .85rem;background:var(--bg3);border:1px solid var(--border);border-radius:8px;font-size:.8rem}
.pos-box-title{font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:.3rem;font-family:'JetBrains Mono',monospace}
.pos-box p{color:var(--text2);line-height:1.5}
.explore-btn{width:100%;padding:.55rem;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:.82rem;cursor:pointer;font-family:'Syne',sans-serif;transition:all .15s;margin-top:.5rem}
.explore-btn:hover{border-color:var(--accent);color:var(--accent2)}
.hidden{display:none!important}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>

    </div>
  </div>
</div>

    lvls.push({lb:'Level 1 — Target Problem',it:[t],tgt:true});
    const pe=easy.filter(p=>p.id!==t.id);
    if(pe.length)lvls.push({lb:'Level 2 — Similar Easy',it:pe});
    if(med.length)lvls.push({lb:'Level 3 — Step Up',it:med});
    if(hard.length)lvls.push({lb:'Level 4 — Challenge Mode',it:hard});
  }
  rm={t,lvls};renderRM();
}

function renderRM(){
  if(!rm)return;
  const{t,lvls}=rm;
  document.getElementById('rm-title').textContent=t.t;
  document.getElementById('rm-sub').textContent=DL[t.d]+' · #'+t.id+' · '+(t.topics||'General');
  const all=lvls.flatMap(l=>l.it);
  const e=all.filter(p=>p.d==='E').length,m=all.filter(p=>p.d==='M').length,h=all.filter(p=>p.d==='H').length;
  document.getElementById('st-easy').textContent=e+' Easy';
  document.getElementById('st-med').textContent=m+' Medium';
  document.getElementById('st-hard').textContent=h+' Hard';
  document.getElementById('st-total').textContent=all.length+' problems in path';
  document.getElementById('stats-bar').classList.remove('hidden');
  const c=document.getElementById('levels-container');c.innerHTML='';
  lvls.forEach((lvl,li)=>{
    const filtered=af==='all'?lvl.it:lvl.it.filter(p=>p.d===af||lvl.tgt);
    if(!filtered.length&&!lvl.tgt)return;
    const sec=document.createElement('div');sec.className='level-section';
    const lbl=document.createElement('div');lbl.className='level-label';lbl.textContent=lvl.lb;sec.appendChild(lbl);
    const grid=document.createElement('div');grid.className='node-grid';
    filtered.forEach((prob,pi)=>{
      if(pi>0){const cl=document.createElement('div');cl.className='conn-line';grid.appendChild(cl);}
      const nd=document.createElement('div');
      nd.className='problem-node'+(lvl.tgt?' target-node':'')+(selNode===prob.id?' selected':'');
      const dot=document.createElement('div');dot.className='node-dot '+DC[prob.d];
      const info=document.createElement('div');info.className='node-info';
      const ntitle=document.createElement('div');ntitle.className='node-title';ntitle.textContent=prob.t;
      const ntop=document.createElement('div');ntop.className='node-topics';ntop.textContent=prob.topics||'';
      info.appendChild(ntitle);info.appendChild(ntop);
      const right=document.createElement('div');right.className='node-right';
      const nid=document.createElement('div');nid.className='node-id';nid.textContent='#'+prob.id;
      const nar=document.createElement('div');nar.className='node-ar';nar.textContent=prob.ar+'%';
      const nbadge=document.createElement('div');nbadge.className='badge '+DC[prob.d];nbadge.textContent=DL[prob.d];
      right.appendChild(nid);right.appendChild(nar);right.appendChild(nbadge);
      nd.appendChild(dot);nd.appendChild(info);nd.appendChild(right);
      nd.addEventListener('click',()=>openPanel(prob,lvl,li));
      grid.appendChild(nd);
    });
    sec.appendChild(grid);c.appendChild(sec);
    if(li<lvls.length-1){
      const bc=document.createElement('div');
      bc.style.cssText='height:28px;display:flex;align-items:center;justify-content:center;margin-bottom:.5rem';
      const line=document.createElement('div');
      line.style.cssText='width:2px;height:100%;background:linear-gradient(var(--accent),var(--border));opacity:.5;border-radius:1px';
      bc.appendChild(line);c.appendChild(bc);
    }
  });
}

function openPanel(prob,lvl,li){
  selNode=prob.id;renderRM();
  const body=document.getElementById('panel-body');
  const topics=(prob.topics||'').split(',').map(t=>t.trim()).filter(Boolean);
  const posText=lvl.tgt?'This is your target problem — the one you want to master.':(li===0?'Start here to build your foundation.':'Progress from easier problems to reach this level.');
  body.innerHTML='';
  function el(tag,cls,text,attrs){const e=document.createElement(tag);if(cls)e.className=cls;if(text)e.textContent=text;if(attrs)Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));return e;}
  body.appendChild(el('div','badge '+DC[prob.d],DL[prob.d]));
  body.appendChild(el('div','panel-title',prob.t));
  const meta=el('div','panel-meta');
  meta.appendChild(el('div','meta-chip','#'+prob.id));
  meta.appendChild(el('div','meta-chip','✓ '+prob.ar+'%'));
  if(prob.faang)meta.appendChild(el('div','meta-chip','★ FAANG'));
  body.appendChild(meta);
  const posbox=el('div','pos-box');
  posbox.appendChild(el('div','pos-box-title','📍 Roadmap Position'));
  posbox.appendChild(el('p','',posText));
  body.appendChild(posbox);
  body.appendChild(el('div','panel-desc',prob.desc||''));
  body.appendChild(el('div','panel-topics-title','Topics'));
  const tags=el('div','topic-tags');
  topics.forEach(t=>{const tag=el('span','topic-tag',t);tags.appendChild(tag);});
  body.appendChild(tags);
  const link=el('a','panel-link','Open on LeetCode ↗',{href:prob.url,target:'_blank'});
  body.appendChild(link);
  const expl=el('div');
  expl.style.cssText='margin-top:.75rem;padding-top:.75rem;border-top:1px solid var(--border)';
  expl.appendChild(el('div','pos-box-title','Explore from this problem'));
  const ebtn=el('button','explore-btn','Generate roadmap from this problem →');
  ebtn.addEventListener('click',()=>selectById(prob.id));
  expl.appendChild(ebtn);
  body.appendChild(expl);
  document.getElementById('side-panel').style.display='flex';
}

document.getElementById('panel-close').addEventListener('click',()=>{
  selNode=null;document.getElementById('side-panel').style.display='none';renderRM();
});

document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    af=btn.dataset.f;
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.f===af));
    renderRM();
  });
});

function selectById(id){
  selNode=null;document.getElementById('side-panel').style.display='none';
  document.getElementById('roadmap-area').style.display='flex';
  document.getElementById('empty-state').classList.add('hidden');
  document.getElementById('loading-state').classList.remove('hidden');
  document.getElementById('roadmap-view').classList.add('hidden');
  ACE.classList.remove('show');
  setTimeout(()=>{
    buildRM(id);
    document.getElementById('loading-state').classList.add('hidden');
    document.getElementById('roadmap-view').classList.remove('hidden');
    if(byId[id])SE.value=byId[id].t;
  },150);
}

document.querySelectorAll('.sug-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const title=btn.dataset.title;
    const found=LC_DATA.find(p=>p.t.toLowerCase()===title.toLowerCase())||LC_DATA.find(p=>p.t.toLowerCase().includes(title.toLowerCase()));
    if(found)selectById(found.id);
  });
});

let acSel=-1,acItems=[];
SE.addEventListener('input',()=>{
  const q=SE.value.trim();acSel=-1;
  if(!q){ACE.classList.remove('show');return;}
  const ql=q.toLowerCase();const isNum=/^\d+$/.test(q);
  if(isNum)acItems=LC_DATA.filter(p=>String(p.id).startsWith(q)).slice(0,8);
  else{
    const ex=LC_DATA.filter(p=>p.t.toLowerCase().startsWith(ql));
    const pa=LC_DATA.filter(p=>!p.t.toLowerCase().startsWith(ql)&&p.t.toLowerCase().includes(ql));
    acItems=[...ex,...pa].slice(0,8);
  }
  if(!acItems.length){ACE.classList.remove('show');return;}
  ACE.innerHTML='';
  acItems.forEach((p,i)=>{
    const div=document.createElement('div');div.className='ac-item';
    div.innerHTML='<span class="ac-id">#'+p.id+'</span><span class="ac-title">'+p.t+'</span><span class="badge '+DC[p.d]+'" style="font-size:.65rem;padding:.15rem .45rem">'+DL[p.d]+'</span>';
    div.addEventListener('click',()=>{selectById(p.id);ACE.classList.remove('show');});
    ACE.appendChild(div);
  });
  ACE.classList.add('show');
});

SE.addEventListener('keydown',e=>{
  const items=ACE.querySelectorAll('.ac-item');
  if(ACE.classList.contains('show')){
    if(e.key==='ArrowDown'){acSel=Math.min(acSel+1,items.length-1);items.forEach((el,i)=>el.classList.toggle('ac-active',i===acSel));e.preventDefault();}
    else if(e.key==='ArrowUp'){acSel=Math.max(acSel-1,0);items.forEach((el,i)=>el.classList.toggle('ac-active',i===acSel));e.preventDefault();}
    else if(e.key==='Enter'&&acSel>=0){selectById(acItems[acSel].id);ACE.classList.remove('show');e.preventDefault();}
    else if(e.key==='Escape')ACE.classList.remove('show');
  }else if(e.key==='Enter'){
    const q=SE.value.trim();const isNum=/^\d+$/.test(q);
    if(isNum&&byId[parseInt(q)])selectById(parseInt(q));
    else{const f=LC_DATA.find(p=>p.t.toLowerCase()===q.toLowerCase());if(f)selectById(f.id);}
  }
});
document.addEventListener('click',e=>{if(!SE.contains(e.target)&&!ACE.contains(e.target))ACE.classList.remove('show');});
</script>
</body>
</html>
